hwmon_name: zotac_platform

fans:
  - fan_name: Fan
    pwm_mode: 0

    pwm_enable:
      manual_value: 1
      auto_value: 2
      pwm_enable_path: pwm1_enable

    pwm_write:
      pwm_write_max:
        default: 255
      pwm_write_path: pwm1
      default_curve:
        temp:
          - 10
          - 20
          - 30
          - 40
          - 50
          - 60
          - 70
          - 80
          - 90
        pwm:
          - 51
          - 77
          - 102
          - 128
          - 153
          - 179
          - 204
          - 230
          - 255

    pwm_input:
      pwm_read_path: fan1_input
      # Measured max RPMs: 4617 / 4607 / 4597. Using 4617.
      pwm_read_max: 4617

    temp_mode: 0
